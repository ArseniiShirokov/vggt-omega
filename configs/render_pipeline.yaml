# Per-run scene and chunk interval (change these between runs).
scene:
  log_id: 05fb81ab-5e46-3f63-a59f-82fc66d5a477
  frame_start: 0
  frame_end: null  # null = all frames in the scene

# Sliding window: merge N frames, render from pose of frame N+1.
sliding_window:
  enabled: true
  merge_frames: 8

# Standard pipeline parameters.
data_root: argoverse2
checkpoint: /home/jovyan/users/shirokov/thirdparty/vggt-omega/weights/vggt_omega_1b_512.pt
output_dir: outputs/render_test

image_resolution: 512
target_fps: 10.0
device: cuda
crop_bottom: 205

crop_cache_dir: null
sky_mask_cache_dir: outputs/sky_masks
dynamic_mask_cache_dir: outputs/render_test/dynamic_masks
skip_mask_precompute: false

conf_percentile: 0.0
align_metric: true
save_comparison: true
comparison_fps: null

dynamic_filter: true
dynamic_filter_mode: combined
scale_error_threshold: 0.12
min_box_displacement_m: 0.0
box_filter_expand_ratio: 1.15
max_lidar_prompt_points: 12
sam2_model_id: facebook/sam2.1-hiera-base-plus
debug_dynamic_filter: false
